name: publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Publish nur technisch pruefen, ohne Docker-Hub-Push"
        required: false
        default: true
        type: boolean
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2

      - name: Determine publish mode
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "PUBLISH_DRY_RUN=1" >> "${GITHUB_ENV}"
          else
            echo "PUBLISH_DRY_RUN=0" >> "${GITHUB_ENV}"
          fi

      - name: Prepare env
        run: |
          cp .env.example .env
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            IMAGE_TAG="${GITHUB_REF_NAME#v}"
          else
            IMAGE_TAG="sha-${GITHUB_SHA::12}"
          fi
          {
            echo "BACKEND_IMAGE_NAME=trading-bot-backend"
            echo "FRONTEND_IMAGE_NAME=trading-bot-frontend"
            echo "IMAGE_TAG=${IMAGE_TAG}"
          } >> .env
          if [[ -n "${{ secrets.DOCKERHUB_NAMESPACE }}" ]]; then
            echo "DOCKERHUB_NAMESPACE=${{ secrets.DOCKERHUB_NAMESPACE }}" >> .env
          fi

      - name: Run build hook
        run: ./ops/automation/build.sh

      - name: Run test hook
        run: ./ops/automation/test.sh

      - name: Run API regression hook
        run: SKIP_BUILD=1 bash tests/run-api-regression.sh

      - name: Run UI regression hook
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          UI_ARTIFACT_DIR: artifacts/ui-regression
        run: SKIP_BUILD=1 bash tests/run-ui-regression.sh

      - name: Upload UI regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-regression-artifacts-${{ github.run_id }}
          path: artifacts/ui-regression
          if-no-files-found: ignore

      - name: Log in to Docker Hub
        if: env.PUBLISH_DRY_RUN != '1'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync components
        env:
          DRY_RUN: ${{ env.PUBLISH_DRY_RUN }}
          SKIP_BUILD: 1
        run: ./ops/automation/sync-components.sh
